name: Release Creation

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Get Version
      id: get_version
      run: echo "VERSION=$(node -p "require('./module.json').version")" >> $GITHUB_ENV

    # Nutzt den eingebauten Linux-Befehl, steuert aber die Dateien direkt an
    # Dadurch bleibt die ZIP-Struktur absolut flach, wie Foundry es will
    - name: Create Flat Zip
      run: |
        zip -j ./module.zip ./module.json ./main.js

    - name: Create and Update Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ github.ref_name }}
        name: Release ${{ github.ref_name }}
        draft: false
        prerelease: false
        files: |
          ./module.json
          ./module.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}