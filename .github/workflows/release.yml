name: Release Creation

on:
  push:
    tags:
      - 'v*' # Reagiert automatisch, wenn ein Tag hochgeladen wird (z.B. v1.0.2)

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Get Version
      id: get_version
      run: echo "VERSION=$(node -p "require('./module.json').version")" >> $GITHUB_ENV

    - name: Zip Files
      run: |
        zip -r ./json-uploader.zip module.json main.js

    # Erstellt jetzt das Release AUTOMATISCH und lädt die Dateien hoch
    - name: Create and Update Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ github.ref_name }}
        name: Release ${{ github.ref_name }}
        draft: false
        prerelease: false
        files: |
          ./module.json
          ./json-uploader.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}