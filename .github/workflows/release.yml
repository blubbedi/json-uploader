name: Release Creation

on:
  release:
    types: [published]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Get Version
      id: get_version
      run: echo "VERSION=$(node -p "require('./module.json').version")" >> $GITHUB_ENV

    - name: Zip Files
      run: |
        zip -r ./module.json-uploader.zip . -x ".git/*" ".github/*"

    - name: Update Release Assets
      uses: softprops/action-gh-release@v2
      with:
        files: |
          ./module.json
          ./module.json-uploader.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}